- summary: |
    Поиск товара по ключевому слову
  requirement: |
    При верном вводе ключевого слова должен отображаться список товаров
  prerequisites: |
    Открыта главная страница сайта
  test-data: |
    Часть слова поиска = "ca"
  steps:
    - Начать вводить в поле поиска часть слова "са", раскладка кириллица
    - Дождаться появления списка товаров
  expected-result: |
    В списке остаются только товары, в наименовании есть "сa"

- summary: |
    Поиск товара по категории
  requirement: |
    При выборе категории должен отображаться список товаров
  prerequisites: |
    Открыта главная страница сайта
  test-data: |
    Категория = "beauty"
  steps:
    - Нажать на раздел Category
    - Выбрать нужную категорию
  expected-result: |
    Отобразился список товаров выбранной категории

- summary: |
    Фильтрация товаров по цене с учетом скидки
  requirement: |
    При вводе диапазона цены должен отображаться список подходящих товаров, при этом учитывается цена со скидкой
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Диапазон цены = от 119 до 3500.56
    Товар со скидкой: исходная цена 129.99, скидочная 108.53
  steps:
    - В поле From - То ввести 119 и 3500.56
    - Нажать применить фильтр
  expected-result: |
    Отображается список товаров в диапазоне от 119 до 3500.56
    Товар со скидочной ценой 108.53 присутствует в результатах фильтрации

- summary: |
    Постраничная навигация в каталоге
  requirement: |
    При большом количестве товаров должна работать пагинация
  prerequisites: |
    Открыт каталог товаров, количество товаров больше 1 страницы
  test-data: |
    Категория = не выбрана
  steps:
    - Прокрутить каталог до конца
    - Нажать на кнопку "Next"
  expected-result: |
    Отобразилась следующая страница с товарами

- summary: |
    Просмотр подробной информации о товаре
  requirement: |
    При нажатии на карточку товара клиент должен получить подробную информацию о товаре
  prerequisites: |
    Открыта главная страница сайта
  test-data: |
    Товар = Annibale Colombo Bed
  steps:
    - Выбрать товар из списка
    - Открыть карточку товара
  expected-result: |
    Открылась страница с полной информацией о товаре

- summary: |
    Отображение цены со скидкой и без в каталоге
  requirement: |
    На карточке товара видна старая и новая цена
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Товар со скидкой = "Tennis Racket"
  steps:
    - Найти карточку товара
    - Сравнить старую и новую цену
  expected-result: |
    Отображаются обе цены: старая (перечеркнутая) и новая (со скидкой)

- summary: |
    Отображение цены со скидкой и без на странице товара
  requirement: |
    На странице товара видна старая и новая цена
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Товар со скидкой = "Samsung Galaxy Tab S8 Plus Grey"
  steps:
    - Нажать на карточку товара со скидкой
    - На странице товара найти блок с ценой
  expected-result: |
    Отображаются обе цены: старая (перечеркнутая) и новая (со скидкой)

- summary: |
    Отображение рейтинга товара в каталоге
  requirement: |
    На карточке товара виден рейтинг 
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Любой товар с рейтингом
  steps:
    - Навести курсор на карточку товара
    - Найти элемент с рейтингом
  expected-result: |
    Отображается рейтинг товара 

- summary: |
    Отображение рейтинга на странице товара
  requirement: |
    На странице товара виден рейтинг 
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Любой товар с рейтингом
  steps:
    - Нажать на карточку товара
    - На странице товара найти элемент с рейтингом
  expected-result: |
    Отображается рейтинг товара 

- summary: |
    Добавление товара в корзину с продолжением выбора
  requirement: |
    После добавления товара пользователь остается в каталоге
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Товар = "Gucci Bloom Eau de"
  steps:
    - Нажать "Add to cart" на карточке товара
    - Проверить текущий URL страницы
  expected-result: |
    Товар добавлен в корзину, пользователь остался в каталоге

- summary: |
    Просмотр содержимого корзины
  requirement: |
    При нажатии на иконку корзины отображаются все добавленные товары
  prerequisites: |
    В корзину добавлено 2+ разных товара
  test-data: |
    Товар 1 = "Red Nail Polish", Товар 2 = "Dior J'adore"
  steps:
    - Добавить два товара в корзину
    - Нажать на иконку корзины (Cart)
  expected-result: |
    Открылась страница корзины, отображаются оба товара

- summary: |
    Удаление товара из корзины
  requirement: |
    Пользователь может удалить любой товар из корзины
  prerequisites: |
    Открыта страница корзины, в корзине 2+ товара
  test-data: |
    Удаляемый товар = "Red Nail Polish"
  steps:
    - На странице корзины найти товар "Red Nail Polish"
    - Нажать кнопку "Delete"
  expected-result: |
    Товар "Red Nail Polish" исчез из корзины

- summary: |
    Оформление заказа с переходом на страницу оплаты
  requirement: |
    При нажатии "Checkout" появляется окно для оплаты
  prerequisites: |
    В корзине есть хотя бы один товар
  test-data: |
    Товар в корзине = "Dior J'adore"
  steps:
    - Открыть страницу корзины
    - Нажать кнопку "Checkout" 
  expected-result: |
    Произошел появляется окно для оплаты

- summary: |
    Приложение работает без перезагрузки страниц (SPA)
  requirement: |
    Навигация по сайту происходит без полной перезагрузки страницы
  prerequisites: |
    Открыта главная страница
  test-data: |
    DevTools → Network tab
  steps:
    - Перейти из каталога в карточку товара
    - Перейти из карточки товара в корзину
    - Переключить язык интерфейса
  expected-result: |
    Страница не перезагружается (нет белого экрана)

- summary: |
    Переключение языка интерфейса
  requirement: |
    Пользователь может переключить язык интерфейса между русским и английским
  prerequisites: |
    Открыта главная страница
  test-data: |
    Language = English → Russian
  steps:
    - Переключить язык с English на Russian
    - Проверить элементы интерфейса
  expected-result: |
    Все элементы интерфейса отображаются на русском языке

- summary: |
    Локализация на русский язык
  requirement: |
    Все элементы интерфейса и описания товаров переведены на русский язык
  prerequisites: |
    Пользователь находится на главной странице
  test-data: |
    Language = Russian
  steps:
    - Нажать на вкладку Language
    - Выбрать Russian
  expected-result: |
    Элементы интерфейса и описания товаров переведены на русский язык

- summary: |
    Локализация на английский язык
  requirement: |
    Все элементы интерфейса и описания товаров переведены на английский язык
  prerequisites: |
    Пользователь находится на главной странице
  test-data: |
    Language = English
  steps:
    - Нажать на вкладку Language
    - Выбрать English
  expected-result: |
    Элементы интерфейса и описания товаров переведены на английский язык

- summary: |
    Локализация на испанский язык
  requirement: |
    Все элементы интерфейса и описания товаров переведены на испанский язык
  prerequisites: |
    Пользователь находится на главной странице
  test-data: |
    Language = Spanish
  steps:
    - Нажать на вкладку Language
    - Выбрать Spanish
  expected-result: |
    Элементы интерфейса и описания товаров переведены на испанский язык

- summary: |
    Корзина сохраняется в сессии браузера
  requirement: |
    Добавленные товары остаются в корзине после перезагрузки страницы
  prerequisites: |
    В корзину добавлен 1 товар
  test-data: |
    Товар = "Calvin Klein CK One"
  steps:
    - Добавить товар в корзину
    - Перезагрузить страницу
    - Открыть корзину
  expected-result: |
    Товар остался в корзине после перезагрузки

- summary: |
    Сайт должен иметь мобильную версию
  requirement: |
    Сайт автоматически подстраивается под ширину экрана
  prerequisites: |
    Пользователь находится на главной странице
  test-data: |
    Эмулятор мобильного устройства с разрешением экрана менее 768px
  steps:
    - В DevTools включить Toggle Device Toolbar
    - Выбрать устройство с шириной экрана менее 768px
  expected-result: |
    Сайт автоматически подстроился под ширину экрана, верстка не сломана

- summary: |
    Не ломается верстка при переводе на русский язык
  requirement: |
    При переключении на русский язык элементы интерфейса не наезжают друг на друга
  prerequisites: |
    Открыта главная страница на английском языке
  test-data: |
    Language = Russian
  steps:
    - Переключить язык на русский
    - Проверить кнопки, меню, карточки товаров
  expected-result: |
    Верстка не сломана: текст не выходит за границы блоков, элементы не наезжают друг на друга
