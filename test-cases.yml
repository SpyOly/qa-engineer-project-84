- summary: |
    Сайт должен иметь мобильную версию
  requirement: |
    Кроссплатформенность
  prerequisites: |
    Пользователь находится на главной странице
  test-data: |
    Эмулятор мобильного устройства с разрешением экрана более 768px (ширина)
  steps:
    - В DevTools - Toggle Device Toolbar
    - Выбираем устройства с разрешением экрана более 768px (ширина)
    - Визуально оценить результат
  expected-result: |
    Сайт автоматически подстроился под ширину экрана
