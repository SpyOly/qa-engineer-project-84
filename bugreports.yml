- summary: |
    Описания товаров не переведены на русский язык
  environment: |
    Веб-браузер Mozilla Firefox версия 148.0 (64-разрядная)
    ОС Windows 10 Pro
  steps-to-reproduce: |
    1. Заходим на главную страницу по ссылке https://products-store.hexlet.app/
    2. В правом верхнем углу нажать на Language
    3. Выбрать Russian
  expected-result: |
    Все элементы интерфейса и описания товаров переведены на русский язык
  actual-result: |
    Перевелись только элементы интерфейса

- summary: |
    Поиск товара по ключевому слову не происходит в раскладке кириллица
  environment: |
    Веб-браузер Mozilla Firefox версия 148.0 (64-разрядная)
    ОС Windows 10 Pro
  steps-to-reproduce: |
    1. Заходим на главную страницу по ссылке https://products-store.hexlet.app/
    2. В правом верхнем углу нажать на Language
    3. Выбрать Russian
    4. Начать вводить в поле поиска часть слова "са", раскладка кириллица
  expected-result: |
    Появляются товары отвечающие заданным критериям
  actual-result: |
    Ответ интернет-магазина "Ничего не найдено!"

- summary: |
    Описания товаров не переведены на испанский язык
  environment: |
    Веб-браузер Mozilla Firefox версия 148.0 (64-разрядная)
    ОС Windows 10 Pro
  steps-to-reproduce: |
    1. Заходим на главную страницу по ссылке https://products-store.hexlet.app/
    2. В правом верхнем углу нажать на Language
    3. Выбрать Spanish
  expected-result: |
    Все элементы интерфейса и описания товаров переведены на испанский язык
  actual-result: |
    Перевелись только элементы интерфейса

- summary: |
    Сайт не имеет мобильную версию
  environment: |
    Веб-браузер Mozilla Firefox версия 148.0 (64-разрядная)
    ОС Windows 10 Pro
  steps-to-reproduce: |
    1. Заходим на главную страницу по ссылке https://products-store.hexlet.app/
    2. В DevTools - Toggle Device Toolbar
    3. Выбираем устройства с разрешением экрана более 768px (ширина)
  expected-result: |
    Сайт и все элементы автоматически подстраиваются под ширину экрана
  actual-result: |
    Не происходит перестроение, у сайта нет мобильной версии

- summary: |
    Рейтинг товара не отображается в каталоге
  environment: |
    Веб-браузер Mozilla Firefox версия 148.0 (64-разрядная)
    ОС Windows 10 Pro
  steps-to-reproduce: |
    1. Заходим на главную страницу по ссылке https://products-store.hexlet.app/
    2. Навести курсор на карточку любого товара
  expected-result: |
    Отображается рейтинг товара (звезды или цифра)
  actual-result: |
    Рейтинг товара отсутствует на карточке товара в каталоге

- summary: |
    Ломается верстка при переводе на русский язык
  environment: |
    Веб-браузер Mozilla Firefox версия 148.0 (64-разрядная)
    ОС Windows 10 Pro
  steps-to-reproduce: |
    1. Заходим на главную страницу по ссылке https://products-store.hexlet.app/
    2. В правом верхнем углу нажать на Language
    3. Выбрать Russian
    4. Проверить кнопки, меню, карточки товаров
  expected-result: |
    Верстка не сломана: текст не выходит за границы блоков, элементы не наезжают друг на друга
  actual-result: |
    Текст выходит за границы кнопок и наезжает на соседние элементы
